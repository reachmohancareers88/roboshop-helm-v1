{{ if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roboshop-{{ .Values.app_name }}
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.app_name }}-dev.rdevopsb89.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name:  roboshop-frontend
                port:
                  number: 80
{{ end }}
